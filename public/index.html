<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="sidebar">
    <h2>💰 Keuangan</h2>
    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/tambah">➕ Tambah</a>
    <a href="/dataPage">📋 Data</a>
    <a href="/admin" id="adminLink" style="display:none;">👑 Admin</a>
    <a href="#" onclick="logout()">🚪 Logout</a>
</div>
<div class="main">
    <h1>Dashboard</h1>
    <div class="dashboard">
        <div class="card"><h3>💰 Saldo</h3><div class="value" id="saldo">Rp 0</div></div>
        <div class="card"><h3>📈 Pemasukan</h3><div class="value masuk" id="masuk">Rp 0</div></div>
        <div class="card"><h3>📉 Pengeluaran</h3><div class="value keluar" id="keluar">Rp 0</div></div>
    </div>
</div>
<script>
function rupiah(angka) {
    return "Rp " + Number(angka).toLocaleString("id-ID")
}

async function ambilData() {
    const res = await fetch("/data")
    const data = await res.json()
    let saldo = 0, masuk = 0, keluar = 0
    data.forEach(d => {
        if (d.tipe === "masuk") { saldo += d.jumlah; masuk += d.jumlah }
        else { saldo -= d.jumlah; keluar += d.jumlah }
    })
    document.getElementById("saldo").innerHTML = rupiah(saldo)
    document.getElementById("masuk").innerHTML = rupiah(masuk)
    document.getElementById("keluar").innerHTML = rupiah(keluar)
}

async function logout() {
    await fetch('/api/logout', { method: 'POST' })
    window.location.href = '/login'
}

async function checkUserRole() {
    try {
        const res = await fetch('/api/me')
        const user = await res.json()
        if (user && user.role === 'admin') {
            document.getElementById('adminLink').style.display = 'block'
        }
    } catch (error) {}
}

ambilData()
checkUserRole()
</script>
</body>
</html>
